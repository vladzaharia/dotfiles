# mise configuration
# https://mise.jdx.dev/configuration.html

[settings]
# Warn (not error) on missing tools
not_found_auto_install = true

# Verbose output for installs
verbose = false

# Number of jobs for parallel installs
jobs = 4

# Trust project .mise.toml files automatically
trusted_config_paths = []

[tools]
node = ["lts", "latest"]  # lts is first = default active version
pnpm = "latest"

[env]
# Auto-load .env files in project directories
_.file = ".env"
