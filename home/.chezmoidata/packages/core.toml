description = "Essential CLI tools"
required = true
client_only = false  # installs on servers too

[darwin]
brew = ["chezmoi", "age", "atuin", "bat", "direnv", "eza", "fd", "fzf", "gnupg", "jq", "micro", "mise", "ripgrep", "tealdeer", "ugrep", "yq", "zoxide"]

[debian]
apt = ["chezmoi", "bat", "direnv", "fd-find", "fzf", "jq", "micro", "ripgrep", "ugrep", "yq"]
# eza, atuin, zoxide via script (custom repos or curl install)
# age, mise via curl

[opensuse]
zypper = ["chezmoi", "bat", "direnv", "eza", "fd", "fzf", "jq", "atuin", "micro", "zoxide", "tealdeer"]
